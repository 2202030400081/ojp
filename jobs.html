<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs — JobNexus</title>
  <meta name="description" content="Explore thousands of job opportunities. Filter by location, salary, and job type.">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand"><div class="logo-icon"><i class="fas fa-bolt"></i></div><span class="gradient-text">JobNexus</span></a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a><a href="jobs.html" class="active">Browse Jobs</a><a href="company-auth.html">For Employers</a>
      </div>
      <div class="nav-actions">
        <a href="user-auth.html" class="btn btn-ghost btn-sm">Sign In</a>
        <a href="user-auth.html#register" class="btn btn-primary btn-sm">Get Started</a>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </nav>

  <section class="section" style="padding-top:120px;">
    <div class="container">
      <div class="section-header" style="text-align:left;">
        <h2>Browse <span class="gradient-text">Job Openings</span></h2>
        <p>Showing <strong id="jobCount">9</strong> available positions</p>
      </div>
      <!-- Search & Filters -->
      <div class="search-box" style="margin-bottom:32px;">
        <div class="search-row">
          <div class="search-input-wrap" style="flex:2;"><i class="fas fa-search"></i><input type="text" id="searchKeyword" placeholder="Job title, keyword, or company..." oninput="searchJobs()"></div>
          <div class="search-input-wrap"><i class="fas fa-map-marker-alt"></i><input type="text" id="searchLocation" placeholder="City or remote..." oninput="searchJobs()"></div>
          <div class="search-input-wrap"><i class="fas fa-briefcase"></i>
            <select id="searchType" onchange="searchJobs()"><option value="">All Types</option><option>Full-time</option><option>Part-time</option><option>Remote</option><option>Contract</option><option>Internship</option></select>
          </div>
          <div class="search-input-wrap"><i class="fas fa-dollar-sign"></i>
            <select id="searchSalary" onchange="searchJobs()"><option value="">Any Salary</option><option value="0-50">Under $50K</option><option value="50-100">$50K - $100K</option><option value="100-150">$100K - $150K</option><option value="150+">$150K+</option></select>
          </div>
        </div>
      </div>
      <div class="jobs-grid" id="allJobs"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>&copy; 2026 JobNexus. All rights reserved.</span>
        <div class="footer-socials">
          <a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-linkedin-in"></i></a><a href="#"><i class="fab fa-github"></i></a>
        </div>
      </div>
    </div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>
  <script src="scripts/data.js"></script><script src="scripts/app.js"></script>
</body>
</html>
